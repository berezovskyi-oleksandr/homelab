---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: flux-system
spec:
  suspend: true
  chart:
    spec:
      chart: immich
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      version: 0.10.3
  interval: 1m0s
  targetNamespace: immich
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.5.6
            env:
              DB_HOSTNAME: immich-db
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-credentials
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-credentials
                    key: DB_PASSWORD
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-credentials
                    key: DB_DATABASE_NAME
              DB_STORAGE_TYPE: HDD
    immich:
      persistence:
        library:
          existingClaim: immich-library
    server:
      enabled: true
      ingress:
        main:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt
          hosts:
            - host: ${IMMICH_HOST}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - ${IMMICH_HOST}
              secretName: immich-tls
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          storageClass: nfs-synology-ssd
          accessMode: ReadWriteOnce
          size: 10Gi
          type: persistentVolumeClaim
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          size: 1Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          storageClass: nfs-synology-ssd
