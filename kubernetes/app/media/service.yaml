apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  type: ClusterIP
  ports:
    - name: 8114-8114
      port: 8114
      targetPort: 8114
      protocol: TCP
  selector:
    app: qbittorrent
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-bt
  namespace: media
  labels:
    app: qbittorrent
spec:
  type: NodePort
  ports:
    - name: bt-tcp
      port: 23312
      targetPort: 23312
      nodePort: 30312
      protocol: TCP
    - name: bt-udp
      port: 23312
      targetPort: 23312
      nodePort: 30312
      protocol: UDP
  selector:
    app: qbittorrent
---
