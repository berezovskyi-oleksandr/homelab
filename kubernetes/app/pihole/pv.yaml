apiVersion: v1
kind: PersistentVolume
metadata:
  name: pihole-config
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nointr
  nfs:
    server: synology.storage.lviv
    path: /volume3/k8s-storage/pihole-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pihole-dnsmasq
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nointr
  nfs:
    server: synology.storage.lviv
    path: /volume3/k8s-storage/pihole-dnsmasq
