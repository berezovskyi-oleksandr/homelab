apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-consume-nfs
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - noatime
    - timeo=30
    - retrans=3
  nfs:
    server: synology.storage.lviv
    path: ${PAPERLESS_CONSUME_NFS_PATH}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
  namespace: paperless
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: paperless-consume-nfs
  resources:
    requests:
      storage: 50Gi
