apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-db-backup
  namespace: gitea
  labels:
    app: gitea-backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: gitea-backup
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: pg-dump
              image: postgres:17
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: gitea-db
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: gitea-credentials
                      key: DB_USERNAME
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: gitea-credentials
                      key: DB_PASSWORD
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: gitea-credentials
                      key: DB_DATABASE_NAME
              command:
                - sh
                - -c
                - pg_dump --clean --if-exists > /backup/dump.sql
              volumeMounts:
                - name: backup-tmp
                  mountPath: /backup
          containers:
            - name: resticprofile
              image: creativeprojects/resticprofile:0.32.0
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  resticprofile -c /secrets/profiles.yaml -n gitea-db backup
                  resticprofile -c /secrets/profiles.yaml -n gitea-db copy
              env:
                - name: B2_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: gitea-backup-config
                      key: B2_ACCOUNT_ID
                - name: B2_ACCOUNT_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gitea-backup-config
                      key: B2_ACCOUNT_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: secrets
                  mountPath: /secrets
                  readOnly: true
                - name: backup-tmp
                  mountPath: /backup
          volumes:
            - name: secrets
              secret:
                secretName: gitea-backup-config
            - name: backup-tmp
              emptyDir: {}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-data-backup
  namespace: gitea
  labels:
    app: gitea-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: gitea-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: resticprofile
              image: creativeprojects/resticprofile:0.32.0
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  resticprofile -c /secrets/profiles.yaml -n gitea-data backup
                  resticprofile -c /secrets/profiles.yaml -n gitea-data copy
              env:
                - name: B2_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: gitea-backup-config
                      key: B2_ACCOUNT_ID
                - name: B2_ACCOUNT_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gitea-backup-config
                      key: B2_ACCOUNT_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: secrets
                  mountPath: /secrets
                  readOnly: true
                - name: data
                  mountPath: /data
                  readOnly: true
          volumes:
            - name: secrets
              secret:
                secretName: gitea-backup-config
            - name: data
              persistentVolumeClaim:
                claimName: gitea-data
