apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-actions
  namespace: flux-system
spec:
  chart:
    spec:
      chart: actions
      version: 0.1.0
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
  targetNamespace: gitea
  interval: 1m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: gitea
  # chart 0.1.0 has a broken `global.storageClass` helper (extra newline breaks YAML),
  # so we set storageClassName via a kustomize patch instead.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: gitea-gitea-actions-act-runner
            patch: |
              - op: add
                path: /spec/volumeClaimTemplates/0/spec/storageClassName
                value: nfs-synology-ssd
  values:
    enabled: true
    giteaRootURL: http://gitea-gitea-http.gitea.svc.cluster.local:3000
    existingSecret: gitea-runner-token
    existingSecretKey: token
    statefulset:
      replicas: 1
      timezone: Europe/Kyiv
      persistence:
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 2Gi
      actRunner:
        config: |
          log:
            level: info
          cache:
            enabled: true
          container:
            require_docker: true
            docker_timeout: 300s
          runner:
            labels:
              - "ubuntu-latest:docker://docker.gitea.com/runner-images:ubuntu-latest"
              - "ubuntu-24.04:docker://docker.gitea.com/runner-images:ubuntu-24.04"
              - "ubuntu-22.04:docker://docker.gitea.com/runner-images:ubuntu-22.04"
      dind:
        rootless: false
