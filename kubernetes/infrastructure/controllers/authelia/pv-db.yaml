apiVersion: v1
kind: PersistentVolume
metadata:
  name: authelia-db
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - timeo=30
    - retrans=3
  nfs:
    server: synology.storage.lviv
    path: /volume3/k8s-storage/authelia-db
