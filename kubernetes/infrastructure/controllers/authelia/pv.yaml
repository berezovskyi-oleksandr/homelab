apiVersion: v1
kind: PersistentVolume
metadata:
  name: authelia-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nointr
  nfs:
    server: synology.storage.lviv
    path: /volume3/k8s-storage/authelia-data
