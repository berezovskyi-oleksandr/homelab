apiVersion: v1
kind: Service
metadata:
  name: victoria-logs-syslog
  namespace: monitoring
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app: server
    app.kubernetes.io/instance: monitoring-victoria-logs-single
    app.kubernetes.io/name: victoria-logs-single
  ports:
    - name: syslog-udp
      protocol: UDP
      port: 514
      targetPort: 514
      nodePort: 30514
